# git-cliff configuration — generates CHANGELOG.md from Conventional Commits.
# Run: `git-cliff --tag v0.1.0 -o CHANGELOG.md` (first release covering all
# history), then `git-cliff -o CHANGELOG.md` on later releases.

[changelog]
header = """
# Changelog

All notable changes to rankoder are documented here.
This project adheres to [Semantic Versioning](https://semver.org), applied to
its *operational contract* (NixOS module options, environment variables, MQTT
topics/payloads, DB migrations) rather than a Rust API.
\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"

# Map commit prefixes to changelog sections; drop noise (chore/docs/etc.).
# Numeric prefixes order the sections; `striptags|trim` removes them in the body.
commit_parsers = [
  { message = "^.*!:", group = "<0> Breaking" },
  { body = ".*security", group = "<1> Security" },
  { message = "^feat", group = "<2> Features" },
  { message = "^fix", group = "<3> Bug Fixes" },
  { message = "^perf", group = "<4> Performance" },
  { message = "^refactor", group = "<5> Refactor" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", skip = true },
  { message = "^docs", skip = true },
  { message = "^test", skip = true },
  { message = "^style", skip = true },
  { message = "^ci", skip = true },
  # Early history used `area: subject` (no conventional type) — consolidate the
  # remainder into one bucket instead of one section per area.
  { message = ".*", group = "<6> Other" },
]
